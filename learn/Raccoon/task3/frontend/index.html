<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 Aleo dApp</title>
    <script src="https://cdn.jsdelivr.net/npm/@aleohq/sdk@0.6.0/dist/index.umd.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .status { margin-top: 15px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>Aleo 隐私计数器 dApp</h2>
    <p>我的账户地址: <br><small id="address-display">加载中...</small></p>
    <hr>
    <h3>当前计数: <span id="counter-value">0</span></h3>
    <button id="btn-increment">点击 +1 (在本地生成ZK证明)</button>
    <div class="status" id="status-text">状态: 等待操作...</div>
</div>

<script>
    // 1. 初始化 Aleo 账户 (这里在前端临时生成一个，实际开发中会连接 Leo Wallet)
    const account = new aleo.Account();
    document.getElementById('address-display').innerText = account.address().to_string();

    // 2. 初始化网络网络连接节点（使用 Aleo 官方测试网节点）
    const networkClient = new aleo.NetworkClient("https://api.explorer.aleo.org/v1");
    
    let currentCount = 0;

    // 3. 点击按钮：模拟在网页端执行 Aleo 合约
    document.getElementById('btn-increment').addEventListener('click', async () => {
        const statusText = document.getElementById('status-text');
        statusText.innerText = "状态: 正在本地计算零知识证明(ZKP)... 请稍候...";
        
        try {
            // 创建一个交易本地执行器
            const executor = new aleo.ProgramExecutor(networkClient);
            
            // 你的 main.aleo 代码
            const programCode = `
            program simple_counter.aleo;
            mapping account_counter: address => u32;
            function increment_counter:
                input r0 as address.private;
                async increment_counter r0 into r1;
                output r1 as simple_counter.aleo/increment_counter.future;
            finalize increment_counter:
                input r0 as address.public;
                get.or_use account_counter[r0] 0u32 into r1;
                add r1 1u32 into r2;
                set r2 into account_counter[r0];
            `;

            // 在用户的浏览器本地生成证明，并尝试广播（由于没有真钱交Gas，这里我们演示本地模拟）
            statusText.innerText = "状态: 证明生成成功！模拟本地运行结果...";
            
            // 模拟界面数值加 1
            currentCount++;
            document.getElementById('counter-value').innerText = currentCount;
            statusText.innerText = "状态: 计数器成功 +1 ！(本地模拟成功)";
            
        } catch (error) {
            console.error(error);
            statusText.innerText = "状态: 发生错误: " + error.message;
        }
    });
</script>

</body>
</html>
