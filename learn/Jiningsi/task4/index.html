<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐私年龄验证 dApp - Aleo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔞 隐私年龄验证系统</h1>
            <p class="subtitle">零知识证明：验证是否成年，永不泄露真实年龄</p>
        </header>

        <div class="main-grid">
            <!-- 注册区域 -->
            <div class="card">
                <h2>📝 用户注册</h2>
                <div class="form-group">
                    <label>用户ID</label>
                    <input type="number" id="userId" placeholder="输入用户ID">
                </div>
                <div class="form-group">
                    <label>真实年龄（隐私输入）</label>
                    <input type="number" id="userAge" placeholder="输入年龄，不会公开">
                </div>
                <button class="btn btn-primary" onclick="registerUser()">注册用户</button>
            </div>

            <!-- 验证区域 -->
            <div class="card">
                <h2>🔐 零知识验证</h2>
                <div class="form-group">
                    <label>要验证的用户ID</label>
                    <input type="number" id="verifyId" placeholder="输入用户ID">
                </div>
                <button class="btn btn-success" onclick="verifyUser()">执行 ZK 验证</button>
                <div id="verifyResult" class="result-box"></div>
            </div>

            <!-- 用户列表 -->
            <div class="card">
                <h2>👥 用户列表</h2>
                <div id="userList" class="user-list">
                    <div class="empty-state">暂无用户</div>
                </div>
            </div>
        </div>

        <!-- 交易日志 -->
        <div class="card log-card">
            <h2>📜 ZK 证明交易日志</h2>
            <div id="transactionLog" class="log-container">
                <div class="log-entry info">系统就绪，年龄数据全程加密保护...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
