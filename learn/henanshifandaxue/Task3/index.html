<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐私投票 dApp - Aleo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 隐私投票系统</h1>
            <p class="subtitle">基于 Aleo 零知识证明的匿名投票应用</p>
        </header>

        <div class="main-grid">
            <!-- 创建提案区域 -->
            <div class="card">
                <h2>📝 创建新提案</h2>
                <div class="form-group">
                    <label>提案标题</label>
                    <input type="text" id="proposalTitle" placeholder="输入提案标题...">
                </div>
                <div class="form-group">
                    <label>提案描述</label>
                    <textarea id="proposalDesc" rows="3" placeholder="详细描述提案内容..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="createProposal()">创建提案</button>
            </div>

            <!-- 提案列表 -->
            <div class="card">
                <h2>📋 进行中的提案</h2>
                <div id="proposalList" class="proposal-list">
                    <div class="empty-state">暂无提案，创建第一个吧！</div>
                </div>
            </div>

            <!-- 投票结果统计 -->
            <div class="card">
                <h2>📊 实时统计</h2>
                <div id="stats">
                    <div class="stat-item">
                        <span class="stat-label">总提案数</span>
                        <span class="stat-value" id="totalProposals">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">总投票数</span>
                        <span class="stat-value" id="totalVotes">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 交易日志 -->
        <div class="card log-card">
            <h2>📜 ZK 证明交易日志</h2>
            <div id="transactionLog" class="log-container">
                <div class="log-entry info">系统就绪，等待操作...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
