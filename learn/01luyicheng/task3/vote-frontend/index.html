<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleo 隐私投票应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 5px;
        }

        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-box p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .vote-options {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .vote-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: 600;
        }

        .vote-btn.agree {
            color: #28a745;
        }

        .vote-btn.agree:hover,
        .vote-btn.agree.active {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .vote-btn.disagree {
            color: #dc3545;
        }

        .vote-btn.disagree:hover,
        .vote-btn.disagree.active {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h3 {
            color: #28a745;
            margin-bottom: 10px;
        }

        .result pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
        }

        .privacy-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .privacy-badge::before {
            content: "🔒";
        }

        .simulation-notice {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 12px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗳️ Aleo 隐私投票</h1>
        <p class="subtitle">基于零知识证明的隐私保护投票应用</p>

        <div class="privacy-badge">
            您的投票将完全保密，仅您能看到投票内容
        </div>

        <div class="info-box">
            <h3>📋 提案信息</h3>
            <p><strong>提案 ID:</strong> 123456789</p>
            <p><strong>提案内容:</strong> 是否支持 Aleo 隐私计算技术的发展？</p>
            <p><strong>程序:</strong> privatevotedapp123.aleo</p>
        </div>

        <div class="form-group">
            <label for="proposalId">提案 ID</label>
            <input type="text" id="proposalId" value="123456789" placeholder="输入提案 ID">
        </div>

        <label>您的投票</label>
        <div class="vote-options">
            <button class="vote-btn agree" onclick="selectVote(event, true)">
                ✅ 赞成
            </button>
            <button class="vote-btn disagree" onclick="selectVote(event, false)">
                ❌ 反对
            </button>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitVote()" disabled>
            提交隐私投票
        </button>

        <div class="result" id="result">
            <h3>✅ 投票成功！</h3>
            <p>您的投票已通过零知识证明加密，以下是生成的隐私记录：</p>
            <pre id="resultContent"></pre>
            <div class="simulation-notice">
                <strong>注意：</strong>此记录为前端模拟展示，仅供演示说明用途。
            </div>
        </div>
    </div>

    <script>
        let selectedVote = null;

        function selectVote(event, vote) {
            selectedVote = vote;
            document.querySelectorAll('.vote-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            document.getElementById('submitBtn').disabled = false;
        }

        function submitVote() {
            const proposalId = document.getElementById('proposalId').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.textContent = '正在生成零知识证明...';

            // 模拟 Aleo 交易生成过程（前端演示用途）
            setTimeout(() => {
                const voteValueStr = selectedVote ? "true" : "false";
                const mockRecord = {
                    owner: "aleo13zjkkxfv9j32vpptr8l7cquwj5rfzzpffs4ulrgpsr0xtjhcmqysw9ee3h.private",
                    proposal_id: `${proposalId}field.private`,
                    vote_value: `${voteValueStr}.private`,
                    _nonce: "8301628259584903346462104516029430349187980231289497466581896199159005825626group.public",
                    _version: "1u8.public"
                };

                document.getElementById('resultContent').textContent = JSON.stringify(mockRecord, null, 2);
                document.getElementById('result').classList.add('show');

                btn.textContent = '投票已提交';
            }, 2000);
        }
    </script>
</body>
</html>
